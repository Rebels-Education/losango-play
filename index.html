<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Losango Play — PAS UFLA 2026</title>
  <meta name="description" content="O preparatório da Rede Losango, agora na sua tela. Aulas ao vivo, professores de Minas, material digital. Tudo no losangoplay.com — sem baixar nada.">
  <link rel="stylesheet" href="css/main.css">
  <link rel="icon" href="assets/logos/losango-play-icon.png">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="js/Icons.jsx"></script>
  <script type="text/babel" src="js/Nav.jsx"></script>
  <script type="text/babel" src="js/CoursesBlock.jsx"></script>
  <script type="text/babel" src="js/HowItWorks.jsx"></script>
  <script type="text/babel" src="js/Numbers.jsx"></script>
  <script type="text/babel" src="js/FAQ.jsx"></script>
  <script type="text/babel" src="js/Checkout.jsx"></script>

  <script type="text/babel">
    function App() {
      const [checkout, setCheckout] = React.useState({ open: false, course: null });

      React.useEffect(() => {
        window.openCheckout = (course) => setCheckout({ open: true, course: course || null });
      }, []);

      return (
        <>
          <Nav/>
          <Hero/>
          <Pillars/>
          <CoursesBlock/>
          <HowItWorks/>
          <Benefits/>
          <Numbers/>
          <ForWhom/>
          <Testimonials/>
          <FAQ/>
          <FinalCTA/>
          <Footer/>
          <Checkout
            open={checkout.open}
            course={checkout.course}
            onClose={() => setCheckout({ open: false, course: null })}
          />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
